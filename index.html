<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Archive</title>
    <style>
        body {
            background-color: #111111; /* Темный фон */
            color: #eeeeee; /* Светлый текст */
            font-family: monospace; /* Минималистичный системный шрифт */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        audio {
            margin-top: 20px;
            outline: none;
            filter: invert(90%); /* Делает плеер темным */
        }
    </style>
</head>
<body>

    <h2>oOoOO_Sedsumting</h2>
    
    <audio controls>
        <source src="oOoOO_Sedsumting.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
    </audio>

</body>
</html>
